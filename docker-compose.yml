version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: gdocs-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: google-docs-clone
    networks:
      - gdocs-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gdocs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - gdocs-network

  # Backend Server
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: gdocs-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/google-docs-clone
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=7d
      - CLIENT_ORIGIN=http://localhost:3000
      - LOG_LEVEL=info
    depends_on:
      - mongodb
      - redis
    networks:
      - gdocs-network
    volumes:
      - ./server/logs:/app/logs

  # Frontend Client
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: gdocs-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - gdocs-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  gdocs-network:
    driver: bridge
